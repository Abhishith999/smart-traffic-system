<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SignalFlow Vizag</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #0f172a; color: white; margin: 0; }
        .login-container { background: #1e293b; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-align: center; width: 300px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #334155; background: #0f172a; color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #5b62f4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #4a51e2; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>⚡ SignalFlow Login</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit">Log In</button>
        <div class="auth-footer" style="margin-top: 1.5rem; text-align: center; font-family: sans-serif;">
            <p style="color: #94a3b8; font-size: 0.875rem; margin: 0;">
                Don't have an account? 
                <a href="/register.html" style="color: #6366f1; text-decoration: none; font-weight: 600; transition: color 0.2s;" onmouseover="this.style.color='#818cf8'" onmouseout="this.style.color='#6366f1'">
                    Register
                </a>
            </p>
        </div>
    </form>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
      apiKey: "AIzaSyDaNMLLNcgv8NZPwBCjpIswrnpK-2UQNOg",
      authDomain: "smart-traffic-alert-syst-83b60.firebaseapp.com",
      projectId: "smart-traffic-alert-syst-83b60",
      storageBucket: "smart-traffic-alert-syst-83b60.firebasestorage.app",
      messagingSenderId: "887235933482",
      appId: "1:887235933482:web:979a5496481cc69afe9a53",
      measurementId: "G-4Q20VGGBLH"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const loginForm = document.getElementById('loginForm');
  
  loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          alert("Login successful! Welcome to SignalFlow.");
          // Fixed Vercel routing path here!
          window.location.href = "/"; 
        })
        .catch((error) => {
          alert("Error: " + error.message);
        });
  });
</script>

</body>
</html>
