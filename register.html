<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SignalFlow Vizag</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background-color: #0f172a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h2 { color: #ffffff; margin-bottom: 0.5rem; text-align: center; font-size: 1.75rem; }
        p.subtitle { color: #94a3b8; text-align: center; margin-bottom: 2rem; font-size: 0.9rem; }
        .input-group { margin-bottom: 1.25rem; }
        label { display: block; color: #e2e8f0; margin-bottom: 0.5rem; font-size: 0.875rem; }
        input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
        .register-btn {
            width: 100%;
            padding: 0.75rem;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }
        .register-btn:hover { background: #4f46e5; }
        .footer { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: #94a3b8; }
        .footer a { color: #6366f1; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2>⚡ Create Account</h2>
        <p class="subtitle">Join SignalFlow Vizag today.</p>
        
        <form id="registerForm">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="register-btn">Sign Up</button>
        </form>

        <div class="footer">
            Already have an account? <a href="login.html">Log In</a>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
